<div class="login-wrapper">
  <div class="login-box">

    <h2>{{ 'forgot.title' | translate }}</h2>

    @if (!success) {
      <form #f="ngForm" (ngSubmit)="onSubmit()" novalidate>

        <div class="form-group">
          <label>{{ 'forgot.email' | translate }}</label>
          <input
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="{{ 'forgot.placeholder' | translate }}"
            required
          />
        </div>

        <button class="btn" type="submit" [disabled]="f.invalid || loading">
          {{ (loading ? 'forgot.sending' : 'forgot.submit') | translate }}
        </button>
      </form>
    }

    @if (success) {
      <p class="success">
        {{ 'forgot.success' | translate }}
      </p>
    }

    @if (error) {
      <p class="error">{{ error }}</p>
    }

    <a class="register-link" [routerLink]="'/login'">
      {{ 'forgot.backToLogin' | translate }}
    </a>

  </div>
</div>
