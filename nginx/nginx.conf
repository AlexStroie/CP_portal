upstream servers {
    server cp_gwt_1:18080 weight=5 fail_timeout=15s;
    server cp_gwt_2:28080 weight=5 fail_timeout=15s;
}

server {
    listen 8080;
    listen [::]:8080;

    server_name cabinetpro.ro www.cabinetpro.ro;

    location /web/ {
        proxy_pass http://servers;
        proxy_http_version 1.1;

        proxy_redirect off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}